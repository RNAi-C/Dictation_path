# PathDictate v0.2.3 Configuration
# -------------------------------------------------
# Paths starting with './' are relative to the portable folder root.
# Edit this file to change app behaviour.

offline_only: true
disable_telemetry: true

# Whisper model path (relative = portable, absolute = fixed machine)
model_path: ./models/faster-whisper-small

# Device: auto | cuda | cpu
device: auto
cpu_compute_type: int8
cuda_compute_type: float16
fallback_device: cpu
fallback_compute_type: int8

# Language settings
# Thai with English medical terms: use "th" for primary language
# Pure English: use "en"
language: en
whisper_language: en
language_mode: thai_with_english_medical_terms
enable_medical_dictionary: true
preserve_english_medical_terms: true

# Transcription quality
temperature: 0.0
beam_size: 5
best_of: 5
vad_filter: true

# Recording
hotkey_toggle_record: f9
sample_rate: 16000
channels: 1

# Terminology dictionary
dictionary_file: ./config/pathology_replacements.json
terminology_enabled: true
case_sensitive: false

# UI
show_transcription_live: true
auto_copy_to_clipboard: true

# Documents / autosave
documents:
  default_draft_folder: ./drafts
  autosave_enabled: true
  autosave_interval_seconds: 60
  autosave_folder: ./autosave
  default_filename_prefix: PathDictate_Draft

# Local AI rewrite (Ollama + Qwen)
llm:
  enabled: true
  provider: ollama
  endpoint: "http://localhost:11434"
  model: "qwen2.5:7b"
  recommended_model: "qwen2.5:7b"
  advanced_model: "qwen2.5:14b"
  auto_start_ollama: true
  ollama_start_command: "ollama serve"
  startup_wait_seconds: 30
  startup_retry_interval_seconds: 2
  temperature: 0.1
  max_tokens: 1024
  timeout_seconds: 120
  allow_model_download: true
  download_requires_confirmation: true

# Privacy
privacy:
  offline_only: true
  log_transcripts_by_default: false
  log_llm_requests: false
  log_audio_content: false
